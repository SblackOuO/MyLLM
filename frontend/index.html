<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Agentic Gemini UI</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <select id="model-select" class="model-dropdown">
                <option value="auto">✨ Auto-Select</option>
                <option value="gemini-2.5-flash">Gemini 2.5 Flash</option>
                <option value="gemini-2.5-pro">Gemini 2.5 Pro</option>
                <option value="gemini-flash-latest">Gemini Flash Latest</option>
                <option value="gemini-pro-latest">Gemini Pro Latest</option>
            </select>
            <button id="new-chat-btn">+ New Chat</button>
            <ul id="chat-list"></ul>
            <button id="clear-chat-btn">Delete Current Chat</button>
        </aside>

        <main class="chat-area">
            <div id="chat-display"></div>
            <div class="input-area">
                <input type="file" id="image-upload" accept="image/*" style="display: none;">
                <label for="image-upload" id="upload-btn">📎</label>
                <div id="input-wrapper">
                    <div id="image-preview-container">
                        <img id="image-preview" src="">
                        <button id="remove-image-btn">✖</button>
                    </div>
                    <input type="text" id="user-input" placeholder="Type message..." autocomplete="off">
                </div>
                <button id="send-btn">Send</button>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
